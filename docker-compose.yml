version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: wa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wearable
      POSTGRES_PASSWORD: wearable_secret
      POSTGRES_DB: wearable_apparels
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wearable -d wearable_apparels"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa_network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://wearable:wearable_secret@db:5432/wearable_apparels
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://wearableapparels.com}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://wearableapparels.com}
      LISTMONK_URL: ${LISTMONK_URL:-http://listmonk:9000}
      LISTMONK_USER: ${LISTMONK_USER:-admin}
      LISTMONK_PASSWORD: ${LISTMONK_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-hello@wearableapparels.com}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    networks:
      - wa_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: wa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - wa_network

  # SSL Certificate Manager
  certbot:
    image: certbot/certbot
    container_name: wa_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - wa_network

volumes:
  postgres_data:
  uploads:
  certbot_data:
  certbot_www:

networks:
  wa_network:
    driver: bridge
