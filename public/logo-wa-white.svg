<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- WA Monogram -->
  <g transform="translate(60, 0)">
    <!-- W letter -->
    <path d="M0 5 L15 55 L30 20 L45 55 L60 5" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- A letter (overlapping) -->
    <path d="M35 55 L55 5 L75 55" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- A crossbar -->
    <line x1="43" y1="35" x2="67" y2="35" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- WEARABLE text -->
  <text x="100" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="6" fill="#ffffff">WEARABLE</text>

  <!-- APPARELS with dashes -->
  <line x1="42" y1="76" x2="58" y2="76" stroke="#ffffff" stroke-width="1.5"/>
  <text x="100" y="79" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="7.5" font-weight="500" letter-spacing="4" fill="#ffffff">APPARELS</text>
  <line x1="142" y1="76" x2="158" y2="76" stroke="#ffffff" stroke-width="1.5"/>
</svg>
